name: Publish Package

on:
  release:
    types: [published]

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64: cargo-zigbuild targets glibc 2.17 (manylinux2014)
          - name: linux-x86_64
            os: ubuntu-latest
            cargo_target: x86_64-unknown-linux-gnu
            zigbuild_glibc: "2.17"
            wheel_plat: manylinux_2_17_x86_64.manylinux2014_x86_64
            use_zigbuild: true

          # macOS Apple Silicon (arm64) — native on macos-latest (M1 runner)
          - name: macos-arm64
            os: macos-latest
            cargo_target: ""
            wheel_plat: macosx_11_0_arm64
            use_zigbuild: false

          # macOS Intel (x86_64) — native on macos-13
          - name: macos-x86_64
            os: macos-13
            cargo_target: ""
            wheel_plat: macosx_10_14_x86_64
            use_zigbuild: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-09-03
          components: rustfmt, clippy

      - uses: astral-sh/setup-uv@v5

      # ── Linux: cargo-zigbuild for manylinux-compatible glibc targeting ──────
      - name: Install cargo-zigbuild (brings zig via ziglang PyPI package)
        if: matrix.use_zigbuild
        run: |
          pip install cargo-zigbuild
          rustup target add ${{ matrix.cargo_target }}

      # ── Build Rust ───────────────────────────────────────────────────────────
      - name: Build cdylib (zigbuild, Linux)
        if: matrix.use_zigbuild
        run: >
          cargo zigbuild --release
          --target ${{ matrix.cargo_target }}.${{ matrix.zigbuild_glibc }}

      - name: Build cdylib (native, macOS)
        if: "!matrix.use_zigbuild"
        run: cargo build --release

      # ── Package wheel ────────────────────────────────────────────────────────
      # hatch_build.py reads CARGO_BUILD_TARGET (finds the right target/ subdir)
      # and WHEEL_PLAT_TAG (stamps the wheel platform tag).
      - name: Install build frontend
        run: pip install build hatchling

      - name: Build wheel
        run: python -m build --wheel --no-isolation
        env:
          CARGO_BUILD_TARGET: ${{ matrix.cargo_target }}
          WHEEL_PLAT_TAG: ${{ matrix.wheel_plat }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi          # Requires a GitHub environment named "pypi"
    permissions:
      id-token: write          # OIDC Trusted Publishing — no API token needed
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true  # Flatten all platform dirs into dist/
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true   # Safe for re-runs; PyPI ignores duplicate files
